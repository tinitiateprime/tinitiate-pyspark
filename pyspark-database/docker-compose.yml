services:
  postgres:
    image: postgres:16-alpine
    container_name: pyspark-training-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pyspark_training}
      POSTGRES_USER: ${POSTGRES_USER:-pyspark_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pyspark_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
