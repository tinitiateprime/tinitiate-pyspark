services:

  postgres:
    image: pgvector/pgvector:pg15
    container_name: ti-batch-postgres
    environment:
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
      POSTGRES_USER: ti_dbuser
      POSTGRES_PASSWORD: tiuser!23456
      POSTGRES_DB: tinitiateai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/lab/sql:ro
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  minio:
    image: minio/minio
    container_name: ti-batch-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  spark-master:
    image: bde2020/spark-master:latest
    container_name: ti-batch-spark-master
    environment:
      INIT_DAEMON_STEP: setup_spark
    ports:
      - "7077:7077"
      - "8088:8080"

  spark-worker:
    image: bde2020/spark-worker:latest
    container_name: ti-batch-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    ports:
      - "8089:8081"

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: ti-batch-jupyter
    depends_on:
      - spark-master
    ports:
      - "8888:8888"
    volumes:
      - ../:/home/jovyan/work
    environment:
      SPARK_MASTER: spark://spark-master:7077
      JUPYTER_TOKEN: admin123

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: ti-batch-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ti_dbuser:tiuser!23456@postgres/tinitiateai
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: ti-batch-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ti_dbuser:tiuser!23456@postgres/tinitiateai
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: ti-batch-airflow-scheduler
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ti_dbuser:tiuser!23456@postgres/tinitiateai
    command: scheduler

volumes:
  postgres_data:
  minio_data:
